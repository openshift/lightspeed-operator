# This kustomization.yaml is not intended to be run by itself,
# since it depends on service name and namespace that are out of this kustomize package.
# It should be run by config/default
resources:
- bases/ols.openshift.io_olsconfigs.yaml
- bases/agentic.openshift.io_agents.yaml
- bases/agentic.openshift.io_componenttools.yaml
- bases/agentic.openshift.io_llmproviders.yaml
- bases/agentic.openshift.io_approvalpolicies.yaml
- bases/agentic.openshift.io_proposalapprovals.yaml
- bases/agentic.openshift.io_proposals.yaml
- bases/agentic.openshift.io_analysisresults.yaml
- bases/agentic.openshift.io_escalationresults.yaml
- bases/agentic.openshift.io_executionresults.yaml
- bases/agentic.openshift.io_verificationresults.yaml
- bases/agentic.openshift.io_proposaltemplates.yaml
- bases/agentic.openshift.io_workflows.yaml
#+kubebuilder:scaffold:crdkustomizeresource

patches:
# [WEBHOOK] To enable webhook, uncomment all the sections with [WEBHOOK] prefix.
# patches here are for enabling the conversion webhook for each CRD
#- path: patches/webhook_in_olsconfigs.yaml
#+kubebuilder:scaffold:crdkustomizewebhookpatch

# [CERTMANAGER] To enable cert-manager, uncomment all the sections with [CERTMANAGER] prefix.
# patches here are for enabling the CA injection for each CRD
#- path: patches/cainjection_in_olsconfigs.yaml
#+kubebuilder:scaffold:crdkustomizecainjectionpatch

# the following config is for teaching kustomize how to do kustomization for CRDs.
configurations:
- kustomizeconfig.yaml
