---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: proposalapprovals.agentic.openshift.io
spec:
  group: agentic.openshift.io
  names:
    kind: ProposalApproval
    listKind: ProposalApprovalList
    plural: proposalapprovals
    singular: proposalapproval
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: "ProposalApproval tracks per-step approval state for a Proposal.
          The\noperator creates it when a Proposal is created. Users update it to\napprove
          or deny individual workflow steps.\n\nProposalApproval has a 1:1 relationship
          with its Proposal (same name,\nsame namespace) and is owned by the Proposal
          via an owner reference\nfor garbage collection.\n\nExample:\n\n\tapiVersion:
          agentic.openshift.io/v1alpha1\n\tkind: ProposalApproval\n\tmetadata:\n\t
          \ name: fix-crash\n\t  namespace: my-namespace\n\t  ownerReferences:\n\t
          \   - apiVersion: agentic.openshift.io/v1alpha1\n\t      kind: Proposal\n\t
          \     name: fix-crash\n\tspec:\n\t  stages:\n\t    - type: Analysis\n\t
          \     analysis: {}\n\t    - type: Execution\n\t      execution:\n\t        option:
          0\n\t        agent: fast"
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ProposalApprovalSpec defines the desired state of ProposalApproval.

              spec.stages is append-only: once a stage is added, it cannot be removed.
              Once denied is set to true on a stage, it cannot be unset.
            properties:
              stages:
                description: |-
                  stages lists the approved (or denied) workflow steps. Each entry is
                  a discriminated union keyed by type.
                items:
                  description: |-
                    ApprovalStage is a discriminated union representing approval for one
                    workflow step. Presence in spec.stages indicates approval; absence means
                    not yet approved (controller checks ApprovalPolicy for auto-approve).
                  properties:
                    analysis:
                      description: |-
                        analysis contains approval parameters for the analysis step.
                        Required when type is Analysis.
                      properties:
                        agent:
                          description: agent overrides the Agent CR for this step,
                            enabling cost control.
                          maxLength: 253
                          minLength: 1
                          type: string
                      type: object
                    decision:
                      description: |-
                        decision indicates whether this stage is approved or denied.
                        Denied is terminal — the entire proposal is denied.
                        Once set to Denied, it cannot be changed.
                      enum:
                      - Approved
                      - Denied
                      type: string
                    escalation:
                      description: |-
                        escalation contains approval parameters for the escalation step.
                        Required when type is Escalation.
                      properties:
                        agent:
                          description: agent overrides the Agent CR for this step,
                            enabling cost control.
                          maxLength: 253
                          minLength: 1
                          type: string
                      type: object
                    execution:
                      description: |-
                        execution contains approval parameters for the execution step.
                        Required when type is Execution.
                      properties:
                        agent:
                          description: agent overrides the Agent CR for this step,
                            enabling cost control.
                          maxLength: 253
                          minLength: 1
                          type: string
                        maxAttempts:
                          description: |-
                            maxAttempts is the number of execution retry attempts approved
                            for this proposal. Must not exceed ApprovalPolicy.spec.maxAttempts.
                            Defaults to 1 if unset.
                          format: int32
                          maximum: 3
                          minimum: 1
                          type: integer
                        option:
                          description: |-
                            option is the 0-based index into the analysis options array
                            selecting which remediation approach to execute.
                          format: int32
                          minimum: 0
                          type: integer
                      type: object
                    type:
                      description: type identifies which workflow step this approval
                        is for.
                      enum:
                      - Analysis
                      - Execution
                      - Verification
                      - Escalation
                      type: string
                    verification:
                      description: |-
                        verification contains approval parameters for the verification step.
                        Required when type is Verification.
                      properties:
                        agent:
                          description: agent overrides the Agent CR for this step,
                            enabling cost control.
                          maxLength: 253
                          minLength: 1
                          type: string
                      type: object
                  required:
                  - type
                  type: object
                  x-kubernetes-validations:
                  - message: analysis is required when type is Analysis, and forbidden
                      otherwise
                    rule: 'self.type == ''Analysis'' ? has(self.analysis) : !has(self.analysis)'
                  - message: execution is required when type is Execution, and forbidden
                      otherwise
                    rule: 'self.type == ''Execution'' ? has(self.execution) : !has(self.execution)'
                  - message: verification is required when type is Verification, and
                      forbidden otherwise
                    rule: 'self.type == ''Verification'' ? has(self.verification)
                      : !has(self.verification)'
                  - message: escalation is required when type is Escalation, and forbidden
                      otherwise
                    rule: 'self.type == ''Escalation'' ? has(self.escalation) : !has(self.escalation)'
                maxItems: 4
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
            x-kubernetes-validations:
            - message: 'stages are append-only: existing stages cannot be removed'
              rule: oldSelf.stages.all(old, self.stages.exists(s, s.type == old.type))
            - message: decision cannot be changed once set to Denied
              rule: oldSelf.stages.all(old, !(has(old.decision) && old.decision ==
                'Denied') || self.stages.exists(s, s.type == old.type && has(s.decision)
                && s.decision == 'Denied'))
            - message: execution maxAttempts cannot be reduced once set
              rule: oldSelf.stages.all(old, old.type != 'Execution' || !has(old.execution)
                || !has(old.execution.maxAttempts) || old.execution.maxAttempts ==
                0 || self.stages.exists(s, s.type == 'Execution' && has(s.execution)
                && has(s.execution.maxAttempts) && s.execution.maxAttempts >= old.execution.maxAttempts))
          status:
            description: ProposalApprovalStatus defines the observed state of ProposalApproval.
            properties:
              stages:
                description: stages contains the per-stage approval status set by
                  the controller.
                items:
                  description: ApprovalStageStatus is the observed state of a single
                    approval stage.
                  properties:
                    conditions:
                      description: conditions for this approval stage.
                      items:
                        description: Condition contains details for one aspect of
                          the current state of this API Resource.
                        properties:
                          lastTransitionTime:
                            description: |-
                              lastTransitionTime is the last time the condition transitioned from one status to another.
                              This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                            format: date-time
                            type: string
                          message:
                            description: |-
                              message is a human readable message indicating details about the transition.
                              This may be an empty string.
                            maxLength: 32768
                            type: string
                          observedGeneration:
                            description: |-
                              observedGeneration represents the .metadata.generation that the condition was set based upon.
                              For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                              with respect to the current state of the instance.
                            format: int64
                            minimum: 0
                            type: integer
                          reason:
                            description: |-
                              reason contains a programmatic identifier indicating the reason for the condition's last transition.
                              Producers of specific condition types may define expected values and meanings for this field,
                              and whether the values are considered a guaranteed API.
                              The value should be a CamelCase string.
                              This field may not be empty.
                            maxLength: 1024
                            minLength: 1
                            pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                            type: string
                          status:
                            description: status of the condition, one of True, False,
                              Unknown.
                            enum:
                            - "True"
                            - "False"
                            - Unknown
                            type: string
                          type:
                            description: type of condition in CamelCase or in foo.example.com/CamelCase.
                            maxLength: 316
                            pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                            type: string
                        required:
                        - lastTransitionTime
                        - message
                        - reason
                        - status
                        - type
                        type: object
                      maxItems: 8
                      type: array
                      x-kubernetes-list-map-keys:
                      - type
                      x-kubernetes-list-type: map
                    name:
                      description: name identifies the workflow step.
                      type: string
                  required:
                  - name
                  type: object
                maxItems: 4
                type: array
                x-kubernetes-list-type: atomic
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
