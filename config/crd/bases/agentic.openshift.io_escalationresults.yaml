---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: escalationresults.agentic.openshift.io
spec:
  group: agentic.openshift.io
  names:
    kind: EscalationResult
    listKind: EscalationResultList
    plural: escalationresults
    singular: escalationresult
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .proposalName
      name: Proposal
      type: string
    - jsonPath: .attempt
      name: Attempt
      type: integer
    - jsonPath: .success
      name: Success
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          EscalationResult records the output of the escalation step. Created by
          the operator after the escalation agent completes. Immutable after
          creation -- never updated. Owned by the parent Proposal for garbage
          collection.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          attempt:
            description: attempt is the 1-based overall attempt number.
            format: int32
            minimum: 1
            type: integer
          completionTime:
            description: completionTime is when escalation completed.
            format: date-time
            type: string
          content:
            description: |-
              content is freeform escalation content produced by the agent.
              will contain the structured ticket payload. For now the agent
              returns freeform escalation content.
            maxLength: 65536
            type: string
          failureReason:
            description: failureReason is populated when success is false due to a
              system error.
            maxLength: 8192
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          proposalName:
            description: proposalName is the name of the parent Proposal in the same
              namespace.
            maxLength: 253
            minLength: 1
            type: string
          sandbox:
            description: sandbox tracks the sandbox pod used for this escalation.
            properties:
              claimName:
                description: |-
                  claimName is the name of the SandboxClaim resource that owns the
                  sandbox pod. Omit when no sandbox has been claimed; an empty string
                  is treated the same as omitted. Maximum 253 characters.
                maxLength: 253
                minLength: 1
                type: string
              completionTime:
                description: completionTime is when the sandbox pod finished (success
                  or failure).
                format: date-time
                type: string
              namespace:
                description: |-
                  namespace is the namespace where the SandboxClaim and its pod live.
                  Must be a valid RFC 1123 DNS label.
                maxLength: 63
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: 'must be a valid DNS label: lowercase alphanumeric characters
                    and hyphens, starting with an alphabetic character and ending
                    with an alphanumeric character'
                  rule: '!format.dns1123Label().validate(self).hasValue()'
              startTime:
                description: startTime is when the sandbox pod was created.
                format: date-time
                type: string
            type: object
          startTime:
            description: startTime is when escalation started.
            format: date-time
            type: string
          success:
            description: success indicates whether the escalation agent reported success.
            type: boolean
          summary:
            description: summary is a Markdown-formatted escalation summary.
            maxLength: 32768
            type: string
        required:
        - attempt
        - proposalName
        - success
        type: object
    served: true
    storage: true
    subresources: {}
