---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: executionresults.agentic.openshift.io
spec:
  group: agentic.openshift.io
  names:
    kind: ExecutionResult
    listKind: ExecutionResultList
    plural: executionresults
    singular: executionresult
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.proposalName
      name: Proposal
      type: string
    - jsonPath: .spec.attempt
      name: Attempt
      type: integer
    - jsonPath: .spec.retryIndex
      name: Retry
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Completed")].reason
      name: Outcome
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ExecutionResult records the output of a single execution step execution.
          Created by the operator after the execution agent completes. Owned by
          the parent Proposal for garbage collection.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec contains the immutable identity fields for this result.
            properties:
              attempt:
                description: attempt is the 1-based overall attempt number.
                format: int32
                minimum: 1
                type: integer
              proposalName:
                description: proposalName is the name of the parent Proposal in the
                  same namespace.
                maxLength: 253
                minLength: 1
                type: string
              retryIndex:
                description: |-
                  retryIndex is the 0-based retry index within the current analysis.
                  First execution has retryIndex 0, first retry has retryIndex 1, etc.
                format: int32
                maximum: 10
                minimum: 0
                type: integer
            required:
            - attempt
            - proposalName
            - retryIndex
            type: object
            x-kubernetes-validations:
            - message: spec is immutable
              rule: self == oldSelf
          status:
            description: status contains result data and conditions.
            minProperties: 1
            properties:
              actionsTaken:
                description: actionsTaken lists what the agent did.
                items:
                  description: |-
                    ExecutionAction describes a single action taken by the execution agent
                    during the execution step. These are recorded in ExecutionStepStatus
                    to provide an audit trail of what the agent actually did.
                  properties:
                    description:
                      description: |-
                        description is a Markdown-formatted explanation of what the agent did
                        (e.g., "Patched deployment/web to set memory limit to 512Mi").
                        Maximum 4096 characters.
                      maxLength: 4096
                      minLength: 1
                      type: string
                    error:
                      description: |-
                        error is the error message if the action failed.
                        Maximum 8192 characters.
                      maxLength: 8192
                      minLength: 1
                      type: string
                    outcome:
                      description: |-
                        outcome indicates whether this individual action succeeded.
                        Must be one of: Succeeded, Failed.
                      enum:
                      - Succeeded
                      - Failed
                      type: string
                    output:
                      description: |-
                        output is the command output or API response from the action.
                        Maximum 32768 characters.
                      maxLength: 32768
                      minLength: 1
                      type: string
                    type:
                      description: |-
                        type is the action category (e.g., "patch", "scale", "restart").
                        Maximum 256 characters.
                      maxLength: 256
                      minLength: 1
                      type: string
                  required:
                  - description
                  - outcome
                  - type
                  type: object
                maxItems: 100
                minItems: 1
                type: array
                x-kubernetes-list-type: atomic
              conditions:
                description: conditions track the lifecycle of this result.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                maxItems: 8
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              failureReason:
                description: failureReason is populated when the step failed due to
                  a system error.
                maxLength: 8192
                minLength: 1
                type: string
              sandbox:
                description: sandbox tracks the sandbox pod used for this execution.
                properties:
                  claimName:
                    description: |-
                      claimName is the name of the SandboxClaim resource that owns the
                      sandbox pod. Maximum 253 characters.
                    maxLength: 253
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      namespace is the namespace where the SandboxClaim and its pod live.
                      Must be a valid RFC 1123 DNS label.
                    maxLength: 63
                    minLength: 1
                    type: string
                    x-kubernetes-validations:
                    - message: 'must be a valid DNS label: lowercase alphanumeric
                        characters and hyphens, starting with an alphabetic character
                        and ending with an alphanumeric character'
                      rule: '!format.dns1123Label().validate(self).hasValue()'
                required:
                - claimName
                - namespace
                type: object
              verification:
                description: |-
                  verification is the lightweight inline verification the execution
                  agent performs immediately after completing its actions.
                properties:
                  conditionOutcome:
                    description: |-
                      conditionOutcome indicates whether the target condition improved
                      after the remediation (e.g., pod is no longer CrashLoopBackOff).
                      Must be one of: Improved, Unchanged, Degraded.
                    enum:
                    - Improved
                    - Unchanged
                    - Degraded
                    type: string
                  summary:
                    description: |-
                      summary is a Markdown-formatted summary of the inline verification.
                      Maximum 4096 characters.
                    maxLength: 4096
                    minLength: 1
                    type: string
                required:
                - conditionOutcome
                - summary
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
