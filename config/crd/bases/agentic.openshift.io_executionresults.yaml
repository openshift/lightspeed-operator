---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: executionresults.agentic.openshift.io
spec:
  group: agentic.openshift.io
  names:
    kind: ExecutionResult
    listKind: ExecutionResultList
    plural: executionresults
    singular: executionresult
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .proposalName
      name: Proposal
      type: string
    - jsonPath: .attempt
      name: Attempt
      type: integer
    - jsonPath: .retryIndex
      name: Retry
      type: integer
    - jsonPath: .success
      name: Success
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ExecutionResult records the output of a single execution step execution.
          Created by the operator after the execution agent completes. Immutable
          after creation -- never updated. Owned by the parent Proposal for
          garbage collection.
        properties:
          actionsTaken:
            description: actionsTaken lists what the agent did.
            items:
              description: |-
                ExecutionAction describes a single action taken by the execution agent
                during the execution step. These are recorded in ExecutionStepStatus
                to provide an audit trail of what the agent actually did.
              properties:
                description:
                  description: |-
                    description is a Markdown-formatted explanation of what the agent did
                    (e.g., "Patched deployment/web to set memory limit to 512Mi").
                    Maximum 4096 characters.
                  maxLength: 4096
                  minLength: 1
                  type: string
                error:
                  description: |-
                    error is the error message if the action failed.
                    Maximum 8192 characters.
                  maxLength: 8192
                  minLength: 1
                  type: string
                outcome:
                  description: |-
                    outcome indicates whether this individual action succeeded.
                    Must be one of: Succeeded, Failed.
                  enum:
                  - Succeeded
                  - Failed
                  type: string
                output:
                  description: |-
                    output is the command output or API response from the action.
                    Maximum 32768 characters.
                  maxLength: 32768
                  minLength: 1
                  type: string
                type:
                  description: |-
                    type is the action category (e.g., "patch", "scale", "restart").
                    Maximum 256 characters.
                  maxLength: 256
                  minLength: 1
                  type: string
              required:
              - description
              - type
              type: object
            maxItems: 100
            type: array
            x-kubernetes-list-type: atomic
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          attempt:
            description: attempt is the 1-based overall attempt number.
            format: int32
            minimum: 1
            type: integer
          completionTime:
            description: completionTime is when execution completed.
            format: date-time
            type: string
          components:
            description: components contains optional adapter-defined structured data.
            items:
              x-kubernetes-preserve-unknown-fields: true
            maxItems: 20
            type: array
            x-kubernetes-list-type: atomic
          failureReason:
            description: failureReason is populated when success is false.
            maxLength: 8192
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          proposalName:
            description: proposalName is the name of the parent Proposal in the same
              namespace.
            maxLength: 253
            minLength: 1
            type: string
          retryIndex:
            description: |-
              retryIndex is the 0-based retry index within the current analysis.
              First execution has retryIndex 0, first retry has retryIndex 1, etc.
            format: int32
            minimum: 0
            type: integer
          sandbox:
            description: sandbox tracks the sandbox pod used for this execution.
            properties:
              claimName:
                description: |-
                  claimName is the name of the SandboxClaim resource that owns the
                  sandbox pod. Omit when no sandbox has been claimed; an empty string
                  is treated the same as omitted. Maximum 253 characters.
                maxLength: 253
                minLength: 1
                type: string
              completionTime:
                description: completionTime is when the sandbox pod finished (success
                  or failure).
                format: date-time
                type: string
              namespace:
                description: |-
                  namespace is the namespace where the SandboxClaim and its pod live.
                  Must be a valid RFC 1123 DNS label.
                maxLength: 63
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: 'must be a valid DNS label: lowercase alphanumeric characters
                    and hyphens, starting with an alphabetic character and ending
                    with an alphanumeric character'
                  rule: '!format.dns1123Label().validate(self).hasValue()'
              startTime:
                description: startTime is when the sandbox pod was created.
                format: date-time
                type: string
            type: object
          startTime:
            description: startTime is when execution started.
            format: date-time
            type: string
          success:
            description: success indicates whether the execution agent reported success.
            type: boolean
          verification:
            description: |-
              verification is the lightweight inline verification the execution
              agent performs immediately after completing its actions.
            properties:
              conditionOutcome:
                description: |-
                  conditionOutcome indicates whether the target condition improved
                  after the remediation (e.g., pod is no longer CrashLoopBackOff).
                  Must be one of: Improved, Unchanged, Degraded.
                enum:
                - Improved
                - Unchanged
                - Degraded
                type: string
              summary:
                description: |-
                  summary is a Markdown-formatted summary of the inline verification.
                  Maximum 4096 characters.
                maxLength: 4096
                minLength: 1
                type: string
            required:
            - summary
            type: object
        required:
        - attempt
        - proposalName
        - retryIndex
        - success
        type: object
    served: true
    storage: true
    subresources: {}
