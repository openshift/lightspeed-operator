---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: verificationresults.agentic.openshift.io
spec:
  group: agentic.openshift.io
  names:
    kind: VerificationResult
    listKind: VerificationResultList
    plural: verificationresults
    singular: verificationresult
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .proposalName
      name: Proposal
      type: string
    - jsonPath: .attempt
      name: Attempt
      type: integer
    - jsonPath: .retryIndex
      name: Retry
      type: integer
    - jsonPath: .success
      name: Success
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          VerificationResult records the output of a single verification step
          execution. Created by the operator after the verification agent
          completes. Immutable after creation -- never updated. Owned by the
          parent Proposal for garbage collection.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          attempt:
            description: attempt is the 1-based overall attempt number.
            format: int32
            minimum: 1
            type: integer
          checks:
            description: checks contains individual verification check results.
            items:
              description: |-
                VerifyCheck is a single verification check result from the verification
                agent. Each check corresponds to a VerificationStep from the analysis
                agent's verification plan.
              properties:
                name:
                  description: |-
                    name is the check identifier, matching the VerificationStep name.
                    Maximum 253 characters.
                  maxLength: 253
                  minLength: 1
                  type: string
                result:
                  description: |-
                    result indicates whether the check's observed value matches
                    the expected value. Must be one of: Passed, Failed.
                  enum:
                  - Passed
                  - Failed
                  type: string
                source:
                  description: |-
                    source is what performed the check (e.g., "oc", "promql", "curl").
                    Maximum 256 characters.
                  maxLength: 256
                  minLength: 1
                  type: string
                value:
                  description: |-
                    value is the actual observed value (e.g., "Running", "3 replicas").
                    Maximum 4096 characters.
                  maxLength: 4096
                  minLength: 1
                  type: string
              required:
              - name
              - source
              - value
              type: object
            maxItems: 50
            type: array
            x-kubernetes-list-type: atomic
          completionTime:
            description: completionTime is when verification completed.
            format: date-time
            type: string
          components:
            description: components contains optional adapter-defined structured data.
            items:
              x-kubernetes-preserve-unknown-fields: true
            maxItems: 20
            type: array
            x-kubernetes-list-type: atomic
          failureReason:
            description: failureReason is populated when success is false due to a
              system error.
            maxLength: 8192
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          proposalName:
            description: proposalName is the name of the parent Proposal in the same
              namespace.
            maxLength: 253
            minLength: 1
            type: string
          retryIndex:
            description: retryIndex is the 0-based retry index within the current
              analysis.
            format: int32
            minimum: 0
            type: integer
          sandbox:
            description: sandbox tracks the sandbox pod used for this verification.
            properties:
              claimName:
                description: |-
                  claimName is the name of the SandboxClaim resource that owns the
                  sandbox pod. Omit when no sandbox has been claimed; an empty string
                  is treated the same as omitted. Maximum 253 characters.
                maxLength: 253
                minLength: 1
                type: string
              completionTime:
                description: completionTime is when the sandbox pod finished (success
                  or failure).
                format: date-time
                type: string
              namespace:
                description: |-
                  namespace is the namespace where the SandboxClaim and its pod live.
                  Must be a valid RFC 1123 DNS label.
                maxLength: 63
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: 'must be a valid DNS label: lowercase alphanumeric characters
                    and hyphens, starting with an alphabetic character and ending
                    with an alphanumeric character'
                  rule: '!format.dns1123Label().validate(self).hasValue()'
              startTime:
                description: startTime is when the sandbox pod was created.
                format: date-time
                type: string
            type: object
          startTime:
            description: startTime is when verification started.
            format: date-time
            type: string
          success:
            description: success indicates whether the verification agent reported
              success.
            type: boolean
          summary:
            description: summary is a Markdown-formatted verification summary.
            maxLength: 32768
            type: string
        required:
        - attempt
        - proposalName
        - retryIndex
        - success
        type: object
    served: true
    storage: true
    subresources: {}
