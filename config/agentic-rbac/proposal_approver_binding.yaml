# Binds agentic-proposal-approver to system:cluster-admins group.
# Only cluster-admins can approve/deny proposals.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentic-proposal-approver-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentic-proposal-approver
subjects:
  - kind: Group
    name: system:cluster-admins
    apiGroup: rbac.authorization.k8s.io
