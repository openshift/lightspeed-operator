# ClusterRole for human proposal approvers (cluster-admins).
# Grants read + patch on ProposalApprovals (approve/deny) and read on Proposals (context).
# The operator's own SA uses agentic-operator-manager-role for programmatic create/patch.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentic-proposal-approver
rules:
  - apiGroups: ["agentic.openshift.io"]
    resources: ["proposalapprovals"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["agentic.openshift.io"]
    resources: ["proposals"]
    verbs: ["get", "list", "watch"]
