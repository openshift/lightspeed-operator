                            required:
                            - type
                            type: object
                            x-kubernetes-validations:
                            - message: secretRef with non-empty name is required when
                                type is 'secret'
                              rule: 'self.type == ''secret'' ? has(self.secretRef)
                                && size(self.secretRef.name) > 0 : true'
                            - message: secretRef must not be set when type is 'kubernetes'
                                or 'client'
                              rule: 'self.type != ''secret'' ? !has(self.secretRef)
                                : true'
                        required:
                        - name
                        - valueFrom
                        type: object
                      maxItems: 20
                      type: array
                    name:
                      description: Name of the MCP server
                      type: string
                    timeout:
                      default: 5
                      description: Timeout for the MCP server in seconds, default
                        is 5
                      type: integer
                    url:
                      description: URL of the MCP server (HTTP/HTTPS)
                      pattern: ^https?://.*$
                      type: string
