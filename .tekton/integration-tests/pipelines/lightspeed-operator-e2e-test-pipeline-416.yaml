---
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  annotations:
    pipelinesascode.tekton.dev/task: "[ols-installer, ols-e2e-task]"
  name: ols-integration-tests-pipeline
spec:
  description: |
    Runs OpenShift Lightspeed operator e2e tests on a Konflux ephemeral OpenShift cluster (EaaS).
    Provisions the cluster, installs the operator (OLM bundle or direct/kustomize per install-mode),
    runs tests from the snapshot commit, collects artifacts, then deprovisions.

    Per OpenShift minor: set params.openshift-version-prefix (e.g. 4.16.) and params.test-name
    (Konflux integration test id). For OpenShift 4.16 only, set params.artifact-oci-tag-prefix to "416"
    so pushed artifacts use tag 416<commit>; leave artifact-oci-tag-prefix empty for other versions.
  params:
    - name: SNAPSHOT
      description: 'The JSON string representing the snapshot of the application under test.'
      default: '{"components": [{"name":"test-app", "containerImage": "quay.io/example/repo:latest"}]}'
      type: string
    - name: test-name
      description: 'The name of the test corresponding to a defined Konflux integration test.'
      default: 'ols-e2e-tests-4.16'
      type: string
    - name: namespace
      description: 'Namespace to run tests in'
      default: 'openshift-lightspeed'
      type: string
    - name: openshift-version-prefix
      description: 'Minor line prefix for eaas-get-latest-openshift-version-by-prefix (include trailing dot, e.g. 4.19.)'
      default: '4.16.'
      type: string
    - name: artifact-oci-tag-prefix
      description: 'Prepended to commit SHA in ols-operator-artifacts Quay tag. Use "416" for OCP 4.16; empty for other minors.'
      default: '416'
      type: string
    - name: install-mode
      description: 'Operator install: bundle (OLM) or direct (kustomize; IMG from lightspeed-operator in SNAPSHOT).'
      type: string
      default: 'bundle'
  tasks:
    - name: eaas-provision-space
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
      params:
        - name: ownerKind
          value: PipelineRun
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)
    - name: provision-cluster
      runAfter:
        - eaas-provision-space
      params:
        - name: openshift-version-prefix
          value: $(params.openshift-version-prefix)
      taskSpec:
        params:
          - name: openshift-version-prefix
            type: string
        results:
          - name: clusterName
            value: "$(steps.create-cluster.results.clusterName)"
        steps:
          - name: pick-version
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-latest-openshift-version-by-prefix/0.1/eaas-get-latest-openshift-version-by-prefix.yaml
            params:
              - name: prefix
                value: "$(params.openshift-version-prefix)"
          - name: create-cluster
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.eaas-provision-space.results.secretRef)
              - name: version
                value: "$(steps.pick-version.results.version)"
              - name: instanceType
                value: "m5.large"
    - name: ols-install
      description: Install operator (OLM bundle or direct); record SNAPSHOT containerImage and commit for downstream tasks.
      runAfter:
        - provision-cluster
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
        - name: namespace
          value: "$(params.namespace)"
        - name: install-mode
          value: $(params.install-mode)
      taskSpec:
        results:
          - name: bundle-image
            value: "$(steps.get-snapshot-component.results.bundle-image)"
          - name: commit
            value: "$(steps.get-snapshot-component.results.commit)"
        params:
          - name: SNAPSHOT
          - name: namespace
            type: string
          - name: install-mode
            type: string
            default: "bundle"
        volumes:
          - name: credentials
            emptyDir: {}
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.eaas-provision-space.results.secretRef)
              - name: clusterName
                value: "$(tasks.provision-cluster.results.clusterName)"
              - name: credentials
                value: credentials
          - name: install-operator
            env:
              - name: SNAPSHOT
                value: $(params.SNAPSHOT)
              - name: KONFLUX_COMPONENT_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['appstudio.openshift.io/component']
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              - name: OLS_NAMESPACE
                value: "$(params.namespace)"
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            image: registry.redhat.io/openshift4/ose-cli:latest
            script: |
              set -euo pipefail
              dnf -y install jq python3-pip git curl make golang
              COMMIT="$(jq -r --arg component_name "${KONFLUX_COMPONENT_NAME}" '.components[] | select(.name == $component_name) | .source.git.revision' <<< "$SNAPSHOT")"
              echo "Cloning lightspeed-operator@${COMMIT} for Konflux operator install"
              rm -rf /workspace/lightspeed-operator
              mkdir -p /workspace/lightspeed-operator
              cd /workspace/lightspeed-operator
              git init -q
              git remote add origin https://github.com/openshift/lightspeed-operator.git
              git fetch --depth 1 origin "${COMMIT}"
              git checkout -q FETCH_HEAD
              ./.tekton/integration-tests/scripts/run-konflux-operator-install.sh "$(params.install-mode)"
          - name: get-snapshot-component
            image: registry.redhat.io/openshift4/ose-cli:latest
            env:
              - name: SNAPSHOT
                value: $(params.SNAPSHOT)
              - name: KONFLUX_COMPONENT_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['appstudio.openshift.io/component']
            results:
              - name: bundle-image
                type: string
                description: "SNAPSHOT containerImage for the PipelineRun-labeled Konflux component (bundle or operator manager image)."
              - name: commit
                type: string
                description: "commit sha to be used to store artifacts"
            script: |
              dnf -y install jq
              echo -n "$(jq -r --arg component_name "${KONFLUX_COMPONENT_NAME}" '.components[] | select(.name == $component_name) | .containerImage' <<< "$SNAPSHOT")" > $(step.results.bundle-image.path)
              echo -n "$(jq -r --arg component_name "${KONFLUX_COMPONENT_NAME}" '.components[] | select(.name == $component_name) | .source.git.revision' <<< "$SNAPSHOT")" > $(step.results.commit.path)
    - name: ols-operator-tests
      description: Task to run tests from operator repository
      params:
        - name: commit
          value: $(tasks.ols-install.results.commit)
        - name: artifact-oci-tag-prefix
          value: $(params.artifact-oci-tag-prefix)
      runAfter:
        - ols-install
      taskSpec:
        params:
          - name: commit
          - name: artifact-oci-tag-prefix
            type: string
            default: ""
        volumes:
          - name: azure-openai-token
            secret:
              secretName: azureopenai-apitoken
          - name: azureopenai-entra-id
            secret:
              secretName: azureopenai-entra-id
          - name: bam-token
            secret:
              secretName: bam-apitoken
          - name: openai-token
            secret:
              secretName: openai
          - name: watsonx-token
            secret:
              secretName: watsonx-apitoken
          - name: credentials
            emptyDir: {}
          - name: ols-konflux-artifacts-bot-creds
            secret:
              secretName: ols-konflux-artifacts-bot
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.eaas-provision-space.results.secretRef)
              - name: clusterName
                value: "$(tasks.provision-cluster.results.clusterName)"
              - name: credentials
                value: credentials
          - name: run-e2e-tests
            resources:
              requests:
                memory: "8Gi"
              limits:
                memory: "8Gi"
            onError: continue
            volumeMounts:
              - name: azure-openai-token
                mountPath: /var/run/azure_openai
              - name: azureopenai-entra-id
                mountPath: /var/run/azureopenai-entra-id
              - name: bam-token
                mountPath: /var/run/bam
              - name: openai-token
                mountPath: /var/run/openai
              - name: watsonx-token
                mountPath: /var/run/watsonx
              - name: credentials
                mountPath: /credentials
            env:
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              - name: BAM_PROVIDER_KEY_PATH
                value: "/var/run/bam/token"
              - name: AZUREOPENAI_PROVIDER_KEY_PATH
                value: "/var/run/azure_openai/token"
              - name: OPENAI_PROVIDER_KEY_PATH
                value: "/var/run/openai/token"
              - name: WATSONX_PROVIDER_KEY_PATH
                value: "/var/run/watsonx/token"
              - name: COMMIT_SHA
                value: "$(params.commit)"
              - name: ARTIFACT_DIR
                value: "/workspace"
            image: registry.redhat.io/openshift4/ose-cli:latest
            script: |
              dnf -y install git make golang jq gpgme-devel
              git init lightspeed-operator
              cd lightspeed-operator
              git remote add origin https://github.com/openshift/lightspeed-operator.git
              git fetch --depth=1 --filter=blob:none origin ${COMMIT_SHA}
              git show "${COMMIT_SHA}:.tekton/integration-tests/scripts/run-operator-e2e-tests.sh" | bash -s -- "latest-4.16"
          - name: gather-cluster-resources
            onError: continue
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/openshift/lightspeed-operator
                - name: revision
                  value: $(params.commit)
                - name: pathInRepo
                  value: .tekton/integration-tests/stepactions/gather-cluster-resources/0.1/gather-cluster-resources.yaml
            params:
              - name: credentials
                value: "credentials"
              - name: kubeconfig
                value: "$(steps.get-kubeconfig.results.kubeconfig)"
              - name: artifact-dir
                value: "/workspace/konflux-artifacts"
              - name: gather-script-url
                value: "https://raw.githubusercontent.com/openshift/lightspeed-operator/$(params.commit)/.tekton/integration-tests/scripts/gather-extra.sh"
          # validate that the cluster resources are available in another tekton step
          - name: list-artifacts
            onError: continue
            image: quay.io/konflux-qe-incubator/konflux-qe-tools:latest
            workingDir: "/workspace"
            script: |
              #!/bin/bash
              ls -la /workspace
          - name: push-artifacts
            onError: continue
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/tekton-integration-catalog.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/secure-push-oci/0.1/secure-push-oci.yaml
            params:
              - name: workdir-path
                value: /workspace
              - name: oci-ref
                value: "quay.io/openshift-lightspeed/ols-operator-artifacts:$(params.artifact-oci-tag-prefix)$(params.commit)"
              - name: credentials-volume-name
                value: ols-konflux-artifacts-bot-creds
          - name: fail-if-any-step-failed
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/tekton-integration-catalog.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/fail-if-any-step-failed/0.1/fail-if-any-step-failed.yaml
