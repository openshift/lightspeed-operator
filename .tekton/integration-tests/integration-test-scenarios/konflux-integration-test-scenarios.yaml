# IntegrationTestScenario resources for Konflux (appstudio.redhat.com/v1beta2).
# Apply to your tenant namespace (e.g. crt-nshift-lightspeed-tenant). Each scenario points at the
# per-minor pipeline file in this repo (stable pathInRepo for Konflux) and passes pipeline parameters.
#
# Bundle builds: contexts name component_bundle, install-mode defaults to bundle on the Pipeline.
# Operator image builds: *-direct scenarios use component_lightspeed-operator and install-mode direct
# (same pathInRepo as the matching bundle scenario; IMG from lightspeed-operator in the snapshot).
#
# Resolver paths are relative to repo root (leading slash optional; Konflux accepts both).
---
apiVersion: appstudio.redhat.com/v1beta2
kind: IntegrationTestScenario
metadata:
  name: operator-e2e-tests-416
  namespace: crt-nshift-lightspeed-tenant
  labels:
    test.appstudio.openshift.io/optional: "true"
spec:
  application: ols
  contexts:
    - description: Operator bundle e2e on OCP 4.16
      name: component_bundle
  params:
    - name: test-name
      value: ols-e2e-tests-4.16
    - name: namespace
      value: openshift-lightspeed
    - name: openshift-version-prefix
      value: "4.16."
    - name: artifact-oci-tag-prefix
      value: "416"
  resolverRef:
    resolver: git
    resourceKind: pipeline
    params:
      - name: url
        value: https://github.com/openshift/lightspeed-operator
      - name: revision
        value: main
      - name: pathInRepo
        value: .tekton/integration-tests/pipelines/lightspeed-operator-e2e-test-pipeline-416.yaml
---
